<form class="list-form" [formGroup]="form" (ngSubmit)="submit()">
  <div class="form-field">
    <label class="form-label" for="list-name">Listenname</label>
    <input id="list-name" class="form-input" type="text" formControlName="name" />
    @if (form.controls.name.touched && form.controls.name.hasError('required')) {
      <span class="validation-message">Listenname ist erforderlich</span>
    }
    @if (form.controls.name.touched && form.controls.name.hasError('maxlength')) {
      <span class="validation-message">Listenname darf maximal 80 Zeichen lang sein</span>
    }
  </div>

  <div class="list-form__actions">
    <button class="btn btn-primary" type="submit">
      {{ existingList ? 'Änderungen speichern' : 'Liste speichern' }}
    </button>
    <button class="btn btn-ghost" type="button" (click)="cancel.emit()">Abbrechen</button>
  </div>
</form>
